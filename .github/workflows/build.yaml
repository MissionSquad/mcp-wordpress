name: Build and Test

on:
  pull_request:
    types: [opened, synchronize]
    paths-ignore:
      - '**.md'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mcp-wordpress/package-lock.json

      - name: Install Dependencies
        run: npm ci
        working-directory: mcp-wordpress

      - name: Build Project
        run: npm run build
        working-directory: mcp-wordpress

      - name: Run Tests
        run: npm test
        working-directory: mcp-wordpress
